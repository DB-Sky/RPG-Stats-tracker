<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Tracker amélioré</title>
  <style>
    :root {
      --bg: #13151d;
      --panel: #1d2130;
      --panel-2: #252a3d;
      --text: #f2f5ff;
      --muted: #aeb5ce;
      --accent: #71a3ff;
      --danger: #ff6b7a;
      --border: #3a4364;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #0d1018;
      border-bottom: 1px solid var(--border);
    }
    button, input, select, textarea {
      font: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    button.danger:hover { border-color: var(--danger); color: var(--danger); }
    .badge {
      font-size: .8rem;
      color: var(--muted);
      margin-left: 6px;
    }
    .workspace {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 12px;
      padding: 12px;
      align-items: start;
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      min-width: 300px;
      max-width: 100%;
      overflow: auto;
    }
    .hidden { display: none; }
    h2, h3, h4 { margin: 8px 0; }
    h2 { display: flex; align-items: center; gap: 8px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 8px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #1a1f2e;
    }
    .line { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .line > * { flex: 1; }
    .line .fit { flex: 0 0 auto; }
    textarea { min-height: 70px; width: 100%; }
    .body-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 6px;
    }
    .small { color: var(--muted); font-size: .86rem; }
    label { display:block; margin: 6px 0 4px; }
    .values-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .check-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }
    .check-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      background: var(--panel-2);
    }
    .check-chip input[type="checkbox"] {
      flex: 0 0 auto;
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .inline-two {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
    }
    .req-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
    }
    .overlay-panel {
      position: fixed;
      top: 70px;
      right: 12px;
      width: min(420px, calc(100vw - 24px));
      max-height: calc(100vh - 84px);
      overflow: auto;
      z-index: 50;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
  <header>
    <button onclick="toggleSection('personnage')">🧙 Personnage</button>
    <button onclick="toggleSection('compagnons')">🧑‍🤝‍🧑 Compagnons</button>
    <button onclick="toggleSection('equipements')">🧰 Objets</button>
    <button onclick="toggleSection('vehicules')">🚗 Véhicule</button>
    <button onclick="toggleDicePanel()">🎲 Lancer de dés (bientôt)</button>
    <button onclick="addCompanion()">+ Compagnon</button>
    <button onclick="addExtra('equipements')">+ Objet</button>
    <button onclick="addExtra('vehicules')">+ Véhicule</button>
    <button onclick="exportJson()">💾 Export .json</button>
    <button class="danger" onclick="resetAll()">🗑️ Reset principal</button>
    <label class="fit">📂 Import .json
      <input type="file" accept="application/json" onchange="importJson(event)" style="display:none" />
    </label>
    <button class="fit" style="margin-left:auto" onclick="openAdminTab()">🛠️ Admin</button>
  </header>

  <main class="workspace">
    <section id="personnage" class="section"></section>
    <section id="compagnons" class="section hidden"></section>
    <section id="pnj" class="section hidden"></section>
    <section id="equipements" class="section"></section>
    <section id="vehicules" class="section hidden"></section>
  </main>
  <aside id="dicePanel" class="overlay-panel hidden">
    <h3>🎲 Menu dés (placeholder)</h3>
    <div class="small">Ce panneau sera partagé entre index/admin plus tard pour les interactions personnages, compagnons, PNJ, objets et véhicules.</div>
    <div style="margin-top:8px"><button onclick="toggleDicePanel()">Fermer</button></div>
  </aside>

  <script>
    const STORAGE_KEY = "rpg_tracker_v2";
    const STATS = ["Force", "Constitution", "Vitesse", "Intelligence", "Sagesse"];
    const BASE_RANKS = ["None", "g", "F", "E", "D", "C", "B", "A", "R", "S", "SR", "SS", "SSR", "SSS", "H", "HR", "M", "MR", "G", "GR", "U", "UR"];
    const EX_RANKS = ["g", "F", "E", "D", "C", "B", "A", "R", "S", "SR", "SS", "SSR", "SSS", "H", "HR", "M", "MR", "G", "GR", "U", "UR"].map(r => `${r} EX`);
    const ASTRA_RANKS = ["g", "F", "E", "D", "C", "B", "A", "R", "S", "SR", "SS", "SSR", "SSS", "H", "HR", "M", "MR", "G", "GR", "U", "UR"].map(r => `${r} Astra`);
    const RANKS = [...BASE_RANKS, ...EX_RANKS, ...ASTRA_RANKS, "Undefined"];

    const HP_PARTS = { Tête: 0.10, Torse: 0.20, "Bras gauche": 0.12, "Bras droit": 0.12, "Main gauche": 0.05, "Main droite": 0.05, "Jambe gauche": 0.13, "Jambe droite": 0.13, "Pied gauche": 0.05, "Pied droit": 0.05 };

    const ITEM_CATEGORIES = ["Équipement", "Objets de valeurs", "Module"];
    const ITEM_FILTERS = [...ITEM_CATEGORIES, "Tout"];
    const EQUIPMENT_REQUIREMENT_STATS = ["Force", "Constitution", "Intelligence", "Sagesse"];
    const EQUIPMENT_TYPES = ["Arme", "Armure", "Autre"];
    const WEAPON_TYPES = ["énergétique", "balistique et/ou explosif", "matérielles", "magique"];
    const DAMAGE_TYPES = ["Tranchants", "Perforations", "Contusions"];
    const ARMOR_TYPES = ["énergétique", "matérielles", "magique"];

    const defaultItem = (number = 1) => ({
      nom: String(number),
      description: "",
      categorie: ITEM_CATEGORIES[0],
      level: 1,
      rank: "None",
      equippePar: "none",
      prerequisRanks: Object.fromEntries(EQUIPMENT_REQUIREMENT_STATS.map(stat => [stat, "None"])),
      equipementType: "Autre",
      weaponTypes: [],
      damageTypes: [],
      armorTypes: [],
      armorBodyPart: ""
    });
    function normalizeItemName(type, rawName, index) {
      const fallback = String(index + 1);
      if (rawName == null || String(rawName).trim() === "") return fallback;
      const name = String(rawName).trim();
      const matchEquip = name.match(/^Objets?\s*#\s*(\d+)$/i);
      const matchVehicle = name.match(/^V[ée]hicule\s*#\s*(\d+)$/i);
      if (type === "equipements" && matchEquip) return matchEquip[1];
      if (type === "vehicules" && matchVehicle) return matchVehicle[1];
      return name;
    }
    const parseStoredXp = (value) => {
      if (typeof value === "bigint") return value > 0n ? value : 1n;
      if (typeof value === "string" && /^\d+$/.test(value.trim())) {
        const parsed = BigInt(value.trim());
        return parsed > 0n ? parsed : 1n;
      }
      const fallback = Number(value);
      if (!Number.isFinite(fallback)) return 1n;
      return BigInt(Math.max(1, Math.floor(fallback)));
    };
    const makeCharacter = () => ({
      nom: "",
      bio: [""],
      notes: [""],
      stats: Object.fromEntries(STATS.map(s => [s, { level: 1, rank: "None" }])),
      hpCurrent: {},
      hpTemporaire: 0
    });
    const makeState = () => ({
      personnage: makeCharacter(),
      compagnons: [],
      pnjs: [makeCharacter()],
      sections: {
        equipements: {
          items: [],
          monnaies: {
            pointEchange: 0,
            pieceEnergie: 0,
            monnaieLocale: 0
          },
          filtreCategorie: "Tout",
          searchInput: "",
          searchTerm: ""
        },
        vehicules: { items: [] }
      }
    });

    let state = makeState();

    const rankToValue = (rankLabel) => {
      const idx = RANKS.indexOf(rankLabel);
      return idx >= 0 ? idx + 1 : RANKS.length;
    };
    const valueToRank = (n) => RANKS[Math.max(0, Math.min(RANKS.length - 1, n - 1))];

    function formatLarge(value) {
      const n = typeof value === "bigint" ? Number(value) : Number(value) || 0;
      const sign = n < 0 ? "-" : "";
      const abs = Math.abs(n);
      if (abs < 1000) return `${Math.floor(n)}`;
      const units = ["K", "M", "G", "T", "P", "E", "Z", "Y"];
      let scaled = abs;
      let unitIndex = -1;
      while (scaled >= 1000 && unitIndex < units.length - 1) {
        scaled /= 1000;
        unitIndex++;
      }
      const shown = scaled >= 100 ? scaled.toFixed(0) : scaled >= 10 ? scaled.toFixed(1) : scaled.toFixed(2);
      const compact = shown.replace(/\.?0+$/, "");
      return `${sign}${compact}${units[unitIndex]}`;
    }

    function formatRaw(value) {
      if (typeof value === "bigint") return value.toString();
      const n = Number(value) || 0;
      return n.toLocaleString("fr-FR", { useGrouping: false, maximumFractionDigits: 0 });
    }

    function legacyProgressFromXp(totalXp) {
      const multipliers = [2, 2, 3, 2, 3, 2, 2, 2, 3];
      let xp = parseStoredXp(totalXp);
      let level = 1;
      let rankIdx = 0;
      while (true) {
        if (level <= 9) {
          const need = BigInt(multipliers[level - 1]);
          if (xp < need) break;
          xp /= need;
          level++;
          continue;
        }
        if (rankIdx >= RANKS.length - 1) break;
        level = 1;
        rankIdx++;
        xp /= 2n;
      }
      return { level, rank: RANKS[rankIdx] || "None" };
    }

    function getStatProgress(statData) {
      const fallback = { level: 1, rank: "None" };
      if (!statData || typeof statData !== "object") return fallback;
      if (statData.level != null || statData.rank != null) {
        const level = Math.min(10, Math.max(1, Math.floor(Number(statData.level) || 1)));
        const rank = RANKS.includes(statData.rank) ? statData.rank : "None";
        return { level, rank };
      }
      if (statData.xp != null) {
        return legacyProgressFromXp(statData.xp);
      }
      return fallback;
    }

    function computeHP(entity) {
      const con = getStatProgress(entity.stats.Constitution);
      const isUndefinedRank = con.rank === "Undefined";
      if (isUndefinedRank) {
        const parts = {};
        Object.keys(HP_PARTS).forEach(part => {
          if (entity.hpCurrent[part] == null) entity.hpCurrent[part] = 1;
          entity.hpCurrent[part] = Math.max(1, Math.floor(Number(entity.hpCurrent[part]) || 1));
          parts[part] = { max: null, current: entity.hpCurrent[part] };
        });
        return { total: null, currentTotal: 1, parts, isUndefinedRank: true };
      }

      const total = Math.max(1, Math.floor(100 * con.level * (rankToValue(con.rank) ** 2)));
      const parts = {};
      let currentTotal = 0;
      Object.entries(HP_PARTS).forEach(([part, ratio]) => {
        const max = Math.max(1, Math.floor(total * ratio));
        if (entity.hpCurrent[part] == null) entity.hpCurrent[part] = max;
        entity.hpCurrent[part] = Math.max(0, Math.min(Number(entity.hpCurrent[part]) || 0, max));
        currentTotal += entity.hpCurrent[part];
        parts[part] = { max, current: entity.hpCurrent[part] };
      });
      return { total, currentTotal, parts, isUndefinedRank: false };
    }

    function regenPerHour(partMax, partCurrent) {
      const hpTotal = Math.max(1, Number(partMax) || 1);
      const hpActuel = Math.max(0, Number(partCurrent) || 0);
      const gain = Math.floor(((hpActuel * hpActuel) / hpTotal) * (hpActuel / hpTotal));
      return Math.max(1, gain);
    }

    function globalRankValue(entity) {
      const sum = STATS.reduce((acc, stat) => acc + rankToValue(getStatProgress(entity.stats[stat]).rank), 0);
      return Math.floor(sum / STATS.length);
    }

    function renderTextArray(items, onChangePrefix) {
      return items.map((txt, i) => `
        <div class="card">
          <textarea oninput="${onChangePrefix}[${i}] = this.value; save();">${escapeHtml(txt)}</textarea>
          <div class="line"><button class="danger" onclick="${onChangePrefix}.splice(${i},1); if(!${onChangePrefix}.length) ${onChangePrefix}.push(''); render();">Supprimer ce champ</button></div>
        </div>`).join("");
    }

    function renderCharacterPanel(entity, path, key, title, icon, removable = false, removeAction = "", editableHeaderName = false, showNameField = true) {
      const hp = computeHP(entity);
      const rankGlobalVal = globalRankValue(entity);
      const rankGlobal = valueToRank(rankGlobalVal);

      const statsHtml = STATS.map(stat => {
        const progress = getStatProgress(entity.stats[stat]);
        return `
          <div class="card">
            <h4>${stat}</h4>
            <label>Niveau</label>
            <select onchange="updateStatProgress('${key}', '${stat}', 'level', this.value)">${Array.from({ length: 10 }, (_, i) => i + 1).map(level => `<option value="${level}" ${progress.level === level ? "selected" : ""}>${level}</option>`).join("")}</select>
            <label>Rank</label>
            <select onchange="updateStatProgress('${key}', '${stat}', 'rank', this.value)">${RANKS.map(rank => `<option value="${rank}" ${progress.rank === rank ? "selected" : ""}>${rank}</option>`).join("")}</select>
          </div>`;
      }).join("");

      const hpHtml = Object.entries(hp.parts).map(([part, val]) => `
        <div class="card">
          <div>${part}</div>
          <div class="small">HP max: ${val.max == null ? "?" : `${formatLarge(val.max)} (${formatRaw(val.max)})`}</div>
          <input type="number" min="0" ${val.max == null ? "" : `max="${val.max}"`} value="${val.current}"
            oninput="${path}.hpCurrent['${part}']=Number(this.value)||0; save();" />
          <div class="small">HP actuel: ${formatLarge(val.current)} (${formatRaw(val.current)})</div>
        </div>`).join("");

      return `
        <div class="card">
          <h2>
            ${icon}
            ${editableHeaderName
              ? `<input value="${escapeHtml(entity.nom || title)}" oninput="${path}.nom=this.value; save();" style="max-width:260px" />`
              : title}
            <span class="badge">Rank global: ${rankGlobal}</span>
          </h2>
          ${removable ? `<button class="danger" onclick="${removeAction}">Supprimer ce compagnon</button>` : ""}
          ${showNameField ? `
          <div class="card">
            <label>Nom</label>
            <input value="${escapeHtml(entity.nom)}" oninput="${path}.nom=this.value; save();" />
          </div>` : ""}

          <h3>Description / Bio</h3>
          ${renderTextArray(entity.bio, `${path}.bio`)}
          <button onclick="${path}.bio.push(''); render();">+ Ajouter un champ Bio</button>

          <h3>Statistiques</h3>
          <div class="grid">${statsHtml}</div>

          <h3>HP (total ${hp.isUndefinedRank ? "1" : formatLarge(hp.currentTotal)} / ${hp.isUndefinedRank ? "?" : formatRaw(hp.total)})</h3>
          <div class="card">
            <label>HP temporaire (n'affecte pas les zones et ne se régénère pas)</label>
            <input type="number" step="1" value="${Number(entity.hpTemporaire) || 0}" oninput="${path}.hpTemporaire=Number(this.value)||0; save();" />
          </div>
          <div class="card">
            <div class="line">
              <input id="restHours_${key}" type="number" min="0" step="1" value="1" />
              <button class="fit" onclick="applyRestRecovery('${key}')">Récupérer HP (repos)</button>
            </div>
            <div class="small">Régénération par zone et par heure: gain/h = ((HPactuel²)/HPmax) × (HPactuel/HPmax), arrondi inférieur, minimum 1</div>
          </div>
          <div class="body-grid">${hpHtml}</div>

          <h3>Notes</h3>
          ${renderTextArray(entity.notes, `${path}.notes`)}
          <button onclick="${path}.notes.push(''); render();">+ Ajouter une note</button>
        </div>
      `;
    }

    function renderPersonnage() {
      const container = document.getElementById("personnage");
      container.innerHTML = renderCharacterPanel(state.personnage, "state.personnage", "personnage", "Personnage", "🧙");
    }

    function renderCompagnons() {
      const container = document.getElementById("compagnons");
      const companionsHtml = state.compagnons.map((companion, i) =>
        renderCharacterPanel(companion, `state.compagnons[${i}]`, `compagnon_${i}`, `Compagnon #${i + 1}`, "🧑‍🤝‍🧑", true, `removeCompanion(${i})`, true, false)
      ).join("");
      container.innerHTML = `
        <h2>🧑‍🤝‍🧑 Compagnons</h2>
        ${companionsHtml || "<div class='small'>Aucun compagnon. Clique sur + Compagnon.</div>"}
      `;
    }

    function renderPNJ() {
      const container = document.getElementById("pnj");
      const pnjs = Array.isArray(state.pnjs) && state.pnjs.length ? state.pnjs : [makeCharacter()];
      state.pnjs = pnjs;
      const pnjHtml = state.pnjs.map((pnj, i) =>
        renderCharacterPanel(pnj, `state.pnjs[${i}]`, `pnj_${i}`, `PNJ #${i + 1}`, "🛡️", false, "", true, false)
      ).join("");
      container.innerHTML = `
        <h2>🛡️ Personnage non joueur</h2>
        ${pnjHtml}
      `;
    }

    function renderEntitySection(type, title, icon) {
      const wrap = document.getElementById(type);
      const section = state.sections[type];
      const renderItem = (item, onPath, idx) => `
        <div class="card">
          <label>Nom</label>
          <input value="${escapeHtml(item.nom)}" oninput="${onPath}.nom=this.value; save();" />
          ${type === "equipements" ? `
            <label>Catégorie</label>
            <select onchange="${onPath}.categorie=this.value; save(); render();">${ITEM_CATEGORIES.map(cat => `<option value="${cat}" ${item.categorie === cat ? "selected" : ""}>${cat}</option>`).join("")}</select>
            <div class="inline-two">
              <div>
                <label>Niveau</label>
                <select onchange="${onPath}.level=Math.min(10, Math.max(1, Number(this.value)||1)); save();">${Array.from({ length: 10 }, (_, i) => i + 1).map(level => `<option value="${level}" ${Number(item.level || 1) === level ? "selected" : ""}>${level}</option>`).join("")}</select>
              </div>
              <div>
                <label>Rank</label>
                <select onchange="${onPath}.rank=this.value; save();">${RANKS.map(rank => `<option value="${rank}" ${item.rank === rank ? "selected" : ""}>${rank}</option>`).join("")}</select>
              </div>
            </div>
            ${item.categorie === "Équipement" ? `
              <div class="card">
                <h4>Prérequis d'équipement</h4>
                <div class="req-grid">
                  ${EQUIPMENT_REQUIREMENT_STATS.map(stat => `
                    <div>
                      <label>${stat} requis</label>
                      <select onchange="${onPath}.prerequisRanks['${stat}']=this.value; save();">${RANKS.map(rank => `<option value="${rank}" ${(item.prerequisRanks?.[stat] || "None") === rank ? "selected" : ""}>${rank}</option>`).join("")}</select>
                    </div>
                  `).join("")}
                </div>
              </div>
            ` : ""}
          ` : ""}
          <label>Description</label>
          <textarea oninput="${onPath}.description=this.value; save();">${escapeHtml(item.description)}</textarea>
          ${type === "equipements" && item.categorie === "Équipement" ? `
            <div class="card">
              <h4>Détails d'équipement</h4>
              <label>Type d'équipement</label>
              <select onchange="${onPath}.equipementType=this.value; if(this.value!=='Arme'){${onPath}.weaponTypes=[]; ${onPath}.damageTypes=[];} if(this.value!=='Armure'){${onPath}.armorTypes=[]; ${onPath}.armorBodyPart='';} save(); render();">${EQUIPMENT_TYPES.map(option => `<option value="${option}" ${(item.equipementType || "Autre") === option ? "selected" : ""}>${option}</option>`).join("")}</select>

              ${(item.equipementType || "Autre") === "Arme" ? `
                <label>Type d'arme (choix multiples)</label>
                <div class="check-grid">
                  ${WEAPON_TYPES.map(option => `
                    <label class="check-chip">
                      <input type="checkbox" ${(item.weaponTypes || []).includes(option) ? "checked" : ""} onchange="toggleItemMultiChoice('equipements', ${idx}, 'weaponTypes', '${option}', this.checked)" />
                      <span>${option}</span>
                    </label>
                  `).join("")}
                </div>
                <label>Type de dégâts (choix multiples)</label>
                <div class="check-grid">
                  ${DAMAGE_TYPES.map(option => `
                    <label class="check-chip">
                      <input type="checkbox" ${(item.damageTypes || []).includes(option) ? "checked" : ""} onchange="toggleItemMultiChoice('equipements', ${idx}, 'damageTypes', '${option}', this.checked)" />
                      <span>${option}</span>
                    </label>
                  `).join("")}
                </div>
              ` : ""}

              ${(item.equipementType || "Autre") === "Armure" ? `
                <label>Type d'armure (choix multiples)</label>
                <div class="check-grid">
                  ${ARMOR_TYPES.map(option => `
                    <label class="check-chip">
                      <input type="checkbox" ${(item.armorTypes || []).includes(option) ? "checked" : ""} onchange="toggleItemMultiChoice('equipements', ${idx}, 'armorTypes', '${option}', this.checked)" />
                      <span>${option}</span>
                    </label>
                  `).join("")}
                </div>
                <label>Partie du corps à équiper</label>
                <select onchange="${onPath}.armorBodyPart=this.value; if(${onPath}.equippePar!=='none'){ tryEquipItem('equipements', ${idx}, ${onPath}.equippePar, true); } save(); render();">
                  <option value="" ${(item.armorBodyPart || "") === "" ? "selected" : ""}>Aucune</option>
                  ${Object.keys(HP_PARTS).map(part => `<option value="${part}" ${(item.armorBodyPart || "") === part ? "selected" : ""}>${part}</option>`).join("")}
                </select>
              ` : ""}
            </div>
          ` : ""}
          ${type === "equipements" && item.categorie === "Équipement" ? `
            <label>Équipé par</label>
            <select onchange="tryEquipItem('equipements', ${idx}, this.value)">
              <option value="none" ${item.equippePar === "none" || item.equippePar == null ? "selected" : ""}>Non-équipé</option>
              <option value="personnage" ${item.equippePar === "personnage" ? "selected" : ""}>Personnage (${escapeHtml(state.personnage.nom || "Sans nom")})</option>
              ${state.compagnons.map((companion, idx) => `<option value="compagnon_${idx}" ${item.equippePar === `compagnon_${idx}` ? "selected" : ""}>Compagnon ${idx + 1} (${escapeHtml(companion.nom || "Sans nom")})</option>`).join("")}
            </select>
          ` : ""}
          <div style="margin-top:8px"><button class='danger' onclick="removeExtra('${type}', ${idx})">Supprimer</button></div>
        </div>`;

      const items = Array.isArray(section.items) ? section.items : [];
      const filteredItems = type === "equipements"
        ? items.filter(item => {
            const categoryOk = section.filtreCategorie === "Tout" || item.categorie === section.filtreCategorie;
            const term = (section.searchTerm || "").trim().toLowerCase();
            const searchOk = !term || [item.nom, item.description, item.categorie, item.rank, item.equipementType, ...(item.weaponTypes || []), ...(item.damageTypes || []), ...(item.armorTypes || []), item.armorBodyPart].some(v => String(v || "").toLowerCase().includes(term));
            return categoryOk && searchOk;
          })
        : items;
      const itemsHtml = filteredItems.map((item) => {
        const realIdx = items.indexOf(item);
        return renderItem(item, `state.sections.${type}.items[${realIdx}]`, realIdx);
      }).join("");

      const equipementsTools = type === "equipements" ? `
        <div class="card">
          <h3>💱 Valeurs</h3>
          <div class="values-stack">
            <div>
              <label>Point d'échange</label>
              <input type="number" step="1" value="${section.monnaies.pointEchange}" oninput="state.sections.equipements.monnaies.pointEchange=Number(this.value)||0; save();" />
            </div>
            <div>
              <label>Pièce d'énergie</label>
              <input type="number" step="1" value="${section.monnaies.pieceEnergie}" oninput="state.sections.equipements.monnaies.pieceEnergie=Number(this.value)||0; save();" />
            </div>
            <div>
              <label>Monnaie locale</label>
              <input type="number" step="1" value="${section.monnaies.monnaieLocale}" oninput="state.sections.equipements.monnaies.monnaieLocale=Number(this.value)||0; save();" />
            </div>
          </div>
        </div>
        <div class="card">
          <h3>Filtres</h3>
          <div class="line">
            <label class="fit">Catégorie</label>
            <select onchange="state.sections.equipements.filtreCategorie=this.value; render();">${ITEM_FILTERS.map(cat => `<option value="${cat}" ${section.filtreCategorie === cat ? "selected" : ""}>${cat}</option>`).join("")}</select>
          </div>
          <div class="line">
            <input value="${escapeHtml(section.searchInput || "")}" placeholder="Recherche..." oninput="state.sections.equipements.searchInput=this.value; save();" />
            <button class="fit" onclick="applyEquipementSearch()">Rechercher</button>
          </div>
        </div>
      ` : "";

      wrap.innerHTML = `
        <h2>${icon} ${title}</h2>
        ${equipementsTools}
        ${itemsHtml || "<div class='small'>Aucun élément.</div>"}
      `;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]));
    }

    function getEntityByKey(key) {
      if (key === "personnage") return state.personnage;
      if (key.startsWith("compagnon_")) return state.compagnons[Number(key.replace("compagnon_", ""))];
      return null;
    }

    function tryEquipItem(type, idx, equipTarget, silent = false) {
      const item = state.sections?.[type]?.items?.[idx];
      if (!item) return;
      const target = equipTarget || "none";
      if (target === "none") {
        item.equippePar = "none";
        if (!silent) render();
        return;
      }
      if (item.equipementType === "Armure" && item.armorBodyPart) {
        const owner = getEntityByKey(target);
        const currentPartHp = Number(owner?.hpCurrent?.[item.armorBodyPart]) || 0;
        if (currentPartHp <= 0) {
          alert(`Impossible d'équiper cette armure: ${item.armorBodyPart} est à 0 HP.`);
          item.equippePar = "none";
          render();
          return;
        }
      }
      item.equippePar = target;
      if (!silent) render();
    }

    function toggleItemMultiChoice(type, idx, field, value, checked) {
      const item = state.sections?.[type]?.items?.[idx];
      if (!item) return;
      const current = Array.isArray(item[field]) ? [...item[field]] : [];
      const set = new Set(current);
      if (checked) set.add(value);
      else set.delete(value);
      item[field] = Array.from(set);
      save();
      render();
    }

    function updateStatProgress(key, stat, field, rawValue) {
      const target = getEntityByKey(key);
      if (!target || !target.stats?.[stat]) return;

      const oldHp = computeHP(target);
      const oldParts = Object.fromEntries(Object.entries(oldHp.parts).map(([part, values]) => [part, { ...values }]));
      const wasFull = !oldHp.isUndefinedRank && Object.values(oldParts).every(values => values.max != null && values.current >= values.max);

      if (field === "level") {
        target.stats[stat].level = Math.min(10, Math.max(1, Math.floor(Number(rawValue) || 1)));
      } else if (field === "rank") {
        target.stats[stat].rank = RANKS.includes(rawValue) ? rawValue : "None";
        target.stats[stat].level = 1;
      }

      const newHp = computeHP(target);
      for (const [part, values] of Object.entries(newHp.parts)) {
        if (values.max == null) {
          target.hpCurrent[part] = 1;
          continue;
        }
        if (wasFull) {
          target.hpCurrent[part] = values.max;
          continue;
        }
        const oldValues = oldParts[part] || { current: values.max, max: values.max };
        const ratio = oldValues.max != null && oldValues.max > 0 ? oldValues.current / oldValues.max : 1;
        target.hpCurrent[part] = Math.max(0, Math.min(values.max, Math.floor(values.max * ratio)));
      }
      render();
    }

    function applyRestRecovery(key) {
      const hours = Math.max(0, Math.floor(Number(document.getElementById(`restHours_${key}`)?.value) || 0));
      if (hours <= 0) return;
      const target = key === "personnage"
        ? state.personnage
        : state.compagnons[Number(key.replace("compagnon_", ""))];
      if (!target) return;

      const hp = computeHP(target);
      for (let i = 0; i < hours; i++) {
        for (const [part, values] of Object.entries(hp.parts)) {
          if (values.max == null) continue;
          const current = Number(target.hpCurrent[part]) || 0;
          const gain = regenPerHour(values.max, current);
          target.hpCurrent[part] = Math.min(values.max, current + gain);
        }
      }
      render();
    }

    function addCompanion() {
      state.compagnons.push(makeCharacter());
      document.getElementById("compagnons")?.classList.remove("hidden");
      render();
    }

    function removeCompanion(idx) {
      if (!confirm("Supprimer ce compagnon ?")) return;
      state.compagnons.splice(idx, 1);
      render();
    }

    function addExtra(type) {
      const nextNumber = state.sections[type].items.length + 1;
      state.sections[type].items.push(defaultItem(nextNumber));
      if (type === "vehicules") {
        document.getElementById("vehicules")?.classList.remove("hidden");
      }
      render();
    }

    function applyEquipementSearch() {
      state.sections.equipements.searchTerm = state.sections.equipements.searchInput || "";
      render();
    }

    function removeExtra(type, idx) {
      if (!confirm("Supprimer cet élément ?")) return;
      state.sections[type].items.splice(idx, 1);
      render();
    }

    function toggleSection(id) {
      document.getElementById(id).classList.toggle("hidden");
    }

    function openAdminTab() {
      window.open("admin.html", "_blank", "noopener,noreferrer");
    }

    function toggleDicePanel() {
      document.getElementById("dicePanel")?.classList.toggle("hidden");
    }

    function resetAll() {
      if (!confirm("Confirmer la réinitialisation complète ? Toutes les données seront supprimées.")) return;
      state = makeState();
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById("compagnons")?.classList.add("hidden");
      document.getElementById("vehicules")?.classList.add("hidden");
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "rpg-tracker-save.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importJson(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          state = normalizeState(parsed);
          render();
        } catch {
          alert("Fichier JSON invalide.");
        }
      };
      reader.readAsText(file);
    }

    function normalizeCharacterData(raw) {
      const baseCharacter = makeCharacter();
      const normalized = { ...baseCharacter, ...(raw || {}) };
      normalized.stats = { ...baseCharacter.stats, ...(raw?.stats || {}) };
      for (const stat of STATS) {
        const progress = getStatProgress(normalized.stats[stat]);
        normalized.stats[stat] = { level: progress.level, rank: progress.rank };
      }
      normalized.bio = Array.isArray(normalized.bio) && normalized.bio.length ? normalized.bio : [""];
      normalized.notes = Array.isArray(normalized.notes) && normalized.notes.length ? normalized.notes : [""];
      normalized.hpCurrent = { ...(raw?.hpCurrent || {}) };
      normalized.hpTemporaire = Number(raw?.hpTemporaire) || 0;
      return normalized;
    }

    function normalizeState(parsed) {
      const base = makeState();
      const merged = { ...base, ...parsed };
      merged.personnage = normalizeCharacterData(parsed?.personnage);
      const parsedCompanions = Array.isArray(parsed?.compagnons)
        ? parsed.compagnons
        : Array.isArray(parsed?.sections?.compagnons?.extras)
          ? parsed.sections.compagnons.extras
          : [];
      merged.compagnons = parsedCompanions.map(c => normalizeCharacterData(c));
      merged.pnjs = Array.isArray(parsed?.pnjs) && parsed.pnjs.length
        ? parsed.pnjs.map(c => normalizeCharacterData(c))
        : [makeCharacter()];
      merged.sections = { ...base.sections, ...(parsed?.sections || {}) };
      for (const type of ["equipements", "vehicules"]) {
        const parsedItems = Array.isArray(parsed?.sections?.[type]?.items)
          ? parsed.sections[type].items
          : [
              ...(parsed?.sections?.[type]?.base ? [parsed.sections[type].base] : []),
              ...(Array.isArray(parsed?.sections?.[type]?.extras) ? parsed.sections[type].extras : [])
            ];
        const normalizedItems = parsedItems.length
          ? parsedItems.map((x, i) => ({
              ...defaultItem(i + 1),
              ...x,
              nom: normalizeItemName(type, x?.nom, i),
              categorie: ITEM_CATEGORIES.includes(x?.categorie) ? x.categorie : ITEM_CATEGORIES[0],
              level: Math.min(10, Math.max(1, Math.floor(Number(x?.level) || 1))),
              rank: RANKS.includes(x?.rank) ? x.rank : "None",
              equippePar: typeof x?.equippePar === "string" ? x.equippePar : (typeof x?.equipePar === "string" ? x.equipePar : "none"),
              prerequisRanks: Object.fromEntries(EQUIPMENT_REQUIREMENT_STATS.map(stat => [stat, RANKS.includes(x?.prerequisRanks?.[stat]) ? x.prerequisRanks[stat] : "None"])),
              equipementType: EQUIPMENT_TYPES.includes(x?.equipementType) ? x.equipementType : "Autre",
              weaponTypes: Array.isArray(x?.weaponTypes) ? x.weaponTypes.filter(v => WEAPON_TYPES.includes(v)) : [],
              damageTypes: Array.isArray(x?.damageTypes) ? x.damageTypes.filter(v => DAMAGE_TYPES.includes(v)) : [],
              armorTypes: Array.isArray(x?.armorTypes) ? x.armorTypes.filter(v => ARMOR_TYPES.includes(v)) : [],
              armorBodyPart: Object.keys(HP_PARTS).includes(x?.armorBodyPart) ? x.armorBodyPart : ""
            }))
          : [];

        if (type === "equipements") {
          merged.sections[type] = {
            items: normalizedItems,
            monnaies: {
              pointEchange: Number(parsed?.sections?.equipements?.monnaies?.pointEchange) || 0,
              pieceEnergie: Number(parsed?.sections?.equipements?.monnaies?.pieceEnergie) || 0,
              monnaieLocale: Number(parsed?.sections?.equipements?.monnaies?.monnaieLocale) || 0
            },
            filtreCategorie: ITEM_FILTERS.includes(parsed?.sections?.equipements?.filtreCategorie)
              ? parsed.sections.equipements.filtreCategorie
              : "Tout",
            searchInput: String(parsed?.sections?.equipements?.searchInput || ""),
            searchTerm: String(parsed?.sections?.equipements?.searchTerm || "")
          };
          continue;
        }

        merged.sections[type] = {
          items: normalizedItems
        };
      }
      return merged;
    }

    function save() {
      enforceUniqueNames();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function enforceUniqueNames() {
      const groups = [
        { items: state.compagnons, label: "Compagnon" },
        { items: state.pnjs, label: "PNJ" },
        { items: state.sections.equipements.items, label: "Objet" },
        { items: state.sections.vehicules.items, label: "Véhicule" }
      ];
      groups.forEach(group => {
        const seen = new Map();
        (group.items || []).forEach((item, idx) => {
          const raw = String(item?.nom || "").trim() || `${group.label} ${idx + 1}`;
          const key = raw.toLowerCase();
          const count = (seen.get(key) || 0) + 1;
          seen.set(key, count);
          item.nom = count === 1 ? raw : `${raw} (${count})`;
        });
      });
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) state = normalizeState(JSON.parse(raw));
      } catch {}
    }

    function render() {
      document.getElementById("personnage")?.classList.remove("hidden");
      document.getElementById("pnj")?.classList.add("hidden");
      renderPersonnage();
      renderCompagnons();
      renderEntitySection("equipements", "Objets", "🧰");
      renderEntitySection("vehicules", "Véhicule", "🚗");
      save();
    }

    load();
    render();
  </script>
</body>
</html>
